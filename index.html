<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 투두리스트</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>📝 나의 투두리스트</h1>
            <p class="subtitle" id="dateDisplay"></p>
        </header>

        <div class="input-section">
            <form id="todoForm">
                <input
                    type="text"
                    id="todoInput"
                    placeholder="할 일을 입력하세요..."
                    maxlength="100"
                    autocomplete="off"
                    required
                >
                <button type="submit" id="addBtn">추가</button>
            </form>
        </div>

        <div class="filter-section">
            <div class="filters">
                <button class="filter-btn active" data-filter="all">전체</button>
                <button class="filter-btn" data-filter="active">진행중</button>
                <button class="filter-btn" data-filter="completed">완료</button>
            </div>
            <button id="clearCompleted" class="clear-btn">완료 항목 삭제</button>
        </div>

        <ul id="todoList" class="todo-list"></ul>

        <div class="empty-state" id="emptyState">
            <div class="empty-icon">✨</div>
            <p>할 일이 없습니다</p>
            <span>새로운 할 일을 추가해보세요!</span>
        </div>

        <footer class="stats">
            <span id="stats">총 0개 · 완료 0개 · 진행중 0개</span>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
